* { box-sizing: border-box; margin: 0; padding: 0; }

h1 { font-size: 1.4rem; margin-bottom: 8px; }
.summary { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.summary .counts { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
.summary .count-badge { padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.tab-btn { padding: 8px 16px; border: 2px solid #e2e8f0; border-radius: 20px; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.15s; }
.tab-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
.tab-btn:hover { border-color: #3b82f6; }
.card { background: #fff; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; transition: all 0.15s; }
.card.ng { border-left: 4px solid #ef4444; }
.card.warn { border-left: 4px solid #f59e0b; }
.card.ok { border-left: 4px solid #22c55e; }
.card.ok-guess { border-left: 4px solid #86efac; }
.card .info { flex: 1; min-width: 0; }
.card .filename { font-weight: 700; font-size: 0.95rem; }
.card .meta { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
.card .transcript { font-size: 0.85rem; color: #334155; margin-top: 2px; }
.card .transcript em { color: #ef4444; font-style: normal; font-weight: 600; }
.play-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #3b82f6; color: #fff; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.play-btn:hover { background: #2563eb; transform: scale(1.1); }
.play-btn.playing { background: #ef4444; }
.verdict-btns { display: flex; gap: 4px; flex-shrink: 0; }
.verdict-btns button { padding: 6px 12px; border-radius: 8px; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: all 0.15s; }
.verdict-btns .v-ok.selected { background: #22c55e; color: #fff; border-color: #22c55e; }
.verdict-btns .v-ng.selected { background: #ef4444; color: #fff; border-color: #ef4444; }
.export-bar { position: sticky; bottom: 0; background: #fff; padding: 12px; border-radius: 12px 12px 0 0; box-shadow: 0 -2px 12px rgba(0,0,0,0.1); display: flex; gap: 8px; align-items: center; justify-content: space-between; }
.export-bar button { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
.export-bar .btn-export { background: #3b82f6; color: #fff; }
.export-bar .btn-autoplay { background: #8b5cf6; color: #fff; }
.export-bar .btn-stop { background: #ef4444; color: #fff; }
.hidden { display: none; }
.progress { font-size: 0.85rem; color: #64748b; }
.regen-badge { font-size: 0.7rem; background: #dbeafe; color: #2563eb; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }

</head>

let currentFilter = 'all';
let currentAudio = null;
let autoplayIndex = -1;
let autoplayActive = false;
let verdicts = {}; // file -> 'ok' | 'ng'

// Load saved verdicts from localStorage
try {
  const saved = localStorage.getItem('phoneme-audit-verdicts');
  if (saved) verdicts = JSON.parse(saved);
  // Reset verdicts for regenerated files (audio changed, old judgments invalid)
  // Round tracking: bump this number each time files are re-regenerated
  const REGEN_ROUND = 5;
  const lastRound = parseInt(localStorage.getItem('phoneme-audit-regen-round') || '0', 10);
  if (lastRound < REGEN_ROUND) {
    const regenFiles = AUDIT_DATA.filter(d => d.regenerated).map(d => d.file);
    let resetCount = 0;
    regenFiles.forEach(f => { if (verdicts[f]) { delete verdicts[f]; resetCount++; } });
    if (resetCount > 0) {
      localStorage.setItem('phoneme-audit-verdicts', JSON.stringify(verdicts));
    }
    localStorage.setItem('phoneme-audit-regen-round', String(REGEN_ROUND));
    console.log('Round ' + REGEN_ROUND + ': reset ' + resetCount + ' verdicts for regenerated files');
  }
} catch(e) {}

function saveVerdicts() {
  localStorage.setItem('phoneme-audit-verdicts', JSON.stringify(verdicts));
}

function getFiltered() {
  if (currentFilter === 'all') return AUDIT_DATA;
  if (currentFilter === 'unchecked') return AUDIT_DATA.filter(d => !verdicts[d.file]);
  if (currentFilter === 'regenerated') return AUDIT_DATA.filter(d => d.regenerated);
  if (currentFilter === 'round3') return AUDIT_DATA.filter(d => d.round3);
  if (currentFilter === 'round4') return AUDIT_DATA.filter(d => d.round4);
  return AUDIT_DATA.filter(d => d.cls === currentFilter);
}

function render() {
  const filtered = getFiltered();
  const container = document.getElementById('cards');
  container.innerHTML = '';

  filtered.forEach((d, i) => {
    const cls = d.cls === '확실히_NG' ? 'ng' : d.cls === '의심_NG' ? 'warn' : d.cls === '정상' ? 'ok' : 'ok-guess';
    const verdict = verdicts[d.file] || '';

    const card = document.createElement('div');
    card.className = `card ${cls}`;
    card.id = `card-${d.file}`;
    card.innerHTML = `
      <button class="play-btn" data-file="${d.file}" onclick="playAudio('${d.file}', this)">&#9654;</button>
      <div class="info">
        <div class="filename">${d.file} <span style="font-size:0.75rem;color:#94a3b8;">${d.type}</span>${d.round4 ? ' <span style="font-size:0.7rem;background:#fde2e2;color:#dc2626;padding:1px 6px;border-radius:8px;margin-left:4px;">🔥 R4</span>' : d.round3 ? ' <span style="font-size:0.7rem;background:#fef3c7;color:#d97706;padding:1px 6px;border-radius:8px;margin-left:4px;">🔥 R3</span>' : d.regenerated ? ' <span style="font-size:0.7rem;background:#dbeafe;color:#2563eb;padding:1px 6px;border-radius:8px;margin-left:4px;">🔄 재생성</span>' : ''}</div>
        <div class="transcript">Whisper: <em>"${d.transcript}"</em> &nbsp; 기대: ${d.phoneme.replace(/^(core|onset|rime)_/,'')}</div>
        <div class="meta">${d.duration_s}s | 발음: ${d.speech_start_s}~${d.speech_end_s}s | 앞공백: ${d.leading_silence_s}s 뒤공백: ${d.trailing_silence_s}s</div>
      </div>
      <div class="verdict-btns">
        <button class="v-ok ${verdict==='ok'?'selected':''}" onclick="setVerdict('${d.file}','ok',this)">OK</button>
        <button class="v-ng ${verdict==='ng'?'selected':''}" onclick="setVerdict('${d.file}','ng',this)">NG</button>
      </div>
    `;
    container.appendChild(card);
  });

  updateProgress();
}

function playAudio(file, btn) {
  if (currentAudio) {
    currentAudio.pause();
    document.querySelectorAll('.play-btn.playing').forEach(b => { b.classList.remove('playing'); b.innerHTML = '&#9654;'; });
  }
  const audio = new Audio(AUDIO_BASE + file);
  currentAudio = audio;
  btn.classList.add('playing');
  btn.innerHTML = '&#9632;';
  audio.play();
  audio.onended = () => {
    btn.classList.remove('playing');
    btn.innerHTML = '&#9654;';
    currentAudio = null;
    if (autoplayActive) playNext();
  };
}

function setVerdict(file, verdict, btn) {
  const card = btn.closest('.card');
  card.querySelectorAll('.verdict-btns button').forEach(b => b.classList.remove('selected'));

  if (verdicts[file] === verdict) {
    delete verdicts[file]; // toggle off
  } else {
    verdicts[file] = verdict;
    btn.classList.add('selected');
  }
  saveVerdicts();
  updateProgress();
}

function updateProgress() {
  const total = AUDIT_DATA.length;
  const checked = Object.keys(verdicts).length;
  const okCount = Object.values(verdicts).filter(v => v === 'ok').length;
  const ngCount = Object.values(verdicts).filter(v => v === 'ng').length;
  document.getElementById('progress').textContent = `체크: ${checked}/${total} (OK: ${okCount}, NG: ${ngCount})`;

  // Update summary counts
  const counts = document.getElementById('counts');
  const groups = { '확실히_NG': 0, '의심_NG': 0, '정상_추정': 0, '정상': 0 };
  AUDIT_DATA.forEach(d => { groups[d.cls] = (groups[d.cls]||0) + 1; });
  const unchecked = AUDIT_DATA.filter(d => !verdicts[d.file]).length;

  counts.innerHTML = `
    <span class="count-badge" style="background:#fef2f2;color:#dc2626;">확실히 NG: ${groups['확실히_NG']}</span>
    <span class="count-badge" style="background:#fffbeb;color:#d97706;">의심 NG: ${groups['의심_NG']}</span>
    <span class="count-badge" style="background:#f0fdf4;color:#16a34a;">정상 추정: ${groups['정상_추정']}</span>
    <span class="count-badge" style="background:#f0fdf4;color:#15803d;">정상: ${groups['정상']}</span>
    <span class="count-badge" style="background:#f1f5f9;color:#475569;">미체크: ${unchecked}</span>
  `;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const tabDefs = [
    ['all', '전체 (192)'],
    ['확실히_NG', '확실히 NG'],
    ['의심_NG', '의심 NG'],
    ['정상_추정', '정상 추정'],
    ['정상', '정상'],
    ['regenerated', '재생성됨 ()'],
    ['round3', '🔥 Round 3 (21)'],
    ['round4', '🔥 Round 4 (11)'],
    ['unchecked', '미체크'],
  ];
  tabs.innerHTML = tabDefs.map(([key, label]) =>
    `<button class="tab-btn ${currentFilter===key?'active':''}" onclick="setFilter('${key}')">${label}</button>`
  ).join('');
}

function setFilter(f) {
  currentFilter = f;
  renderTabs();
  render();
}

function startAutoplay() {
  const filtered = getFiltered();
  if (filtered.length === 0) return;
  autoplayActive = true;
  autoplayIndex = 0;
  document.getElementById('autoplayBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.remove('hidden');
  playByIndex(0);
}

function stopAutoplay() {
  autoplayActive = false;
  if (currentAudio) currentAudio.pause();
  document.getElementById('autoplayBtn').classList.remove('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
}

function playNext() {
  autoplayIndex++;
  const filtered = getFiltered();
  if (autoplayIndex >= filtered.length) { stopAutoplay(); return; }
  playByIndex(autoplayIndex);
}

function playByIndex(idx) {
  const filtered = getFiltered();
  const d = filtered[idx];
  const card = document.getElementById('card-' + d.file);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const btn = card.querySelector('.play-btn');
    playAudio(d.file, btn);
  }
}

function exportResults() {
  let csv = '\uFEFF파일명,AI분류,수동판정,Whisper전사,길이,앞공백,뒤공백,재생성\n';
  AUDIT_DATA.forEach(d => {
    const v = verdicts[d.file] || '미체크';
    csv += `${d.file},${d.cls},${v},"${d.transcript}",${d.duration_s},${d.leading_silence_s},${d.trailing_silence_s},${d.regenerated?"Y":"N"}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'phoneme-audit-manual-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Init
renderTabs();
render();
</script>
</body>
</html>
