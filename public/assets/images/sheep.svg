<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg_sheep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFFFFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CEC920;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow_sheep">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg_sheep)" />
  <!-- Accent circle -->
  <circle cx="100" cy="88" r="60" fill="#00CEC915" stroke="#00CEC930" stroke-width="2"/>
  <!-- Emoji -->
  <text x="100" y="105" font-size="64" text-anchor="middle" dominant-baseline="central" filter="url(#shadow_sheep)">🐑</text>
  <!-- Word label -->
  <rect x="30" y="155" width="140" height="32" rx="16" fill="#00CEC9" opacity="0.9"/>
  <text x="100" y="175" font-family="'Fredoka', 'Segoe UI Emoji', sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">sheep</text>
</svg>